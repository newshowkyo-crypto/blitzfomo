    <text x="66" y="31" text-anchor="middle" class="label">TOP32</text>
    <text x="66" y="53" text-anchor="middle" class="small">GROUP STAGE</text>
  </g>

  <g transform="translate(690 248)">
    <rect class="box open" width="132" height="72" rx="16"/>
    <text x="66" y="31" text-anchor="middle" class="label">TOP32</text>
    <text x="66" y="53" text-anchor="middle" class="small">32 LIVE POOLS</text>
  </g>
  <g transform="translate(690 468)">
    <rect class="box open" width="132" height="72" rx="16"/>
    <text x="66" y="31" text-anchor="middle" class="label">TOP32</text>
    <text x="66" y="53" text-anchor="middle" class="small">OPEN NOW</text>
  </g>
  <g transform="translate(690 888)">
    <rect class="box open" width="132" height="72" rx="16"/>
    <text x="66" y="31" text-anchor="middle" class="label">TOP32</text>
    <text x="66" y="53" text-anchor="middle" class="small">KEY MARKET</text>
  </g>
  <g transform="translate(690 1108)">
    <rect class="box open" width="132" height="72" rx="16"/>
    <text x="66" y="31" text-anchor="middle" class="label">TOP32</text>
    <text x="66" y="53" text-anchor="middle" class="small">GROUP STAGE</text>
  </g>

  <g transform="translate(286 382)">
    <rect class="box future" width="136" height="82" rx="18"/>
    <text x="68" y="35" text-anchor="middle" class="label">TOP16</text>
    <text x="68" y="58" text-anchor="middle" class="small">opens after results</text>
  </g>
  <g transform="translate(286 818)">
    <rect class="box future" width="136" height="82" rx="18"/>
    <text x="68" y="35" text-anchor="middle" class="label">TOP8</text>
    <text x="68" y="58" text-anchor="middle" class="small">quarter path</text>
  </g>
  <g transform="translate(522 382)">
    <rect class="box future" width="136" height="82" rx="18"/>
    <text x="68" y="35" text-anchor="middle" class="label">TOP16</text>
    <text x="68" y="58" text-anchor="middle" class="small">knockout path</text>
  </g>
  <g transform="translate(522 818)">
    <rect class="box future" width="136" height="82" rx="18"/>
    <text x="68" y="35" text-anchor="middle" class="label">TOP8</text>
    <text x="68" y="58" text-anchor="middle" class="small">quarter path</text>
  </g>

  <g transform="translate(367 600)">
    <rect class="box future" width="166" height="92" rx="20"/>
    <text x="83" y="39" text-anchor="middle" class="label">TOP4</text>
    <text x="83" y="64" text-anchor="middle" class="small">semi-final keys</text>
  </g>
  <g transform="translate(367 810)">
    <rect class="box future" width="166" height="92" rx="20"/>
    <text x="83" y="39" text-anchor="middle" class="label">FINAL</text>
    <text x="83" y="64" text-anchor="middle" class="small">final match keys</text>
  </g>
  <g transform="translate(300 674)">
    <circle cx="150" cy="55" r="76" fill="rgba(245,199,86,.1)" stroke="url(#gold)" stroke-width="5" filter="url(#glow)"/>
    <text x="150" y="48" text-anchor="middle" class="label">CHAMPION</text>
    <text x="150" y="75" text-anchor="middle" class="small">SUPER POOL</text>
  </g>
  <text x="450" y="1320" text-anchor="middle" class="small">Current launch strategy: TOP32 pools open first. Later stages unlock from admin results.</text>
  <text x="450" y="1360" text-anchor="middle" fill="#f5c756" font-family="Arial,sans-serif" font-size="24" font-weight="900">BLITZ FOMO · WORLD CUP CHAMPION ROAD</text>
</svg>
