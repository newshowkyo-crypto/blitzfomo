user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name blitzfomo.com www.blitzfomo.com localhost;

        set $api_upstream api:3000;
        set $admin_upstream admin:5174;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # Demo landing page
        location / {
            root /var/www/web;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Redirect /admin to /admin/
        location = /admin {
            return 301 /admin/;
        }

        # Canonical main game route now uses the maintained product UI.
        location = /stitch_blitz_finale_world_cup_edition/blitz_finale_world_cup_2026_edition/code.html {
            root /var/www/web;
            try_files /index.html =404;
        }

        # Main game + other Stitch pages
        location /stitch_blitz_finale_world_cup_edition/ {
            alias /var/www/stitch/;
            autoindex off;
            index code.html;
            sub_filter '</body>' '<script src="/app.js"></script></body>';
            sub_filter_once on;
            sub_filter_types text/html;
        }

        # Backend API
        location /api/ {
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket support
        location /socket.io/ {
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Admin frontend static files
        location /admin/ {
            proxy_pass http://$admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Admin SPA assets (absolute paths in built HTML)
        location /assets/ {
            proxy_pass http://$admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Admin API
        # 注意：proxy_pass 必须使用「裸」形式（不带 URI 后缀），与上面的 /api/ 块一致。
        # 因为这里用了变量 $api_upstream，若再写 /admin/api/ 后缀，nginx 会用该字面量
        # 整体替换原始请求 URI，导致 /admin/api/system-logs 被截断为 /admin/api/ → 404。
        # 裸形式会原样转发完整 URI（api 本就在 /admin/api/* 提供路由）。
        # resolver 127.0.0.11 与 $api_upstream 动态解析保持不变。
        location /admin/api/ {
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
