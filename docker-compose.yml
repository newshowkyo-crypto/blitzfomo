services:
  postgres:
    image: postgres:16-alpine
    container_name: blitz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blitz
      POSTGRES_PASSWORD: blitz_dev_2026
      POSTGRES_DB: blitz_finale
    ports:
      - "5434:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blitz -d blitz_finale"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: blitz-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes --requirepass blitz_redis_2026
    volumes:
      - ./.docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "blitz_redis_2026", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: blitz-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://blitz:blitz_dev_2026@postgres:5432/blitz_finale?schema=public
      REDIS_URL: redis://:blitz_redis_2026@redis:6379
      JWT_SECRET: blitz_jwt_super_secret_change_in_prod_2026
      BOT_TOKEN: ${BOT_TOKEN:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-super_admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@2026!}
      OPERATOR_USERNAME: ${OPERATOR_USERNAME:-operator}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-operator123}
      PORT: 3000
      PLISIO_API_KEY: ${PLISIO_API_KEY:-}
      PLISIO_ALLOWED_PSYS_CIDS: ${PLISIO_ALLOWED_PSYS_CIDS:-USDT_TRX,USDT_BSC,BTC,ETH,LTC,TRX}
      PLISIO_SOURCE_CURRENCY: ${PLISIO_SOURCE_CURRENCY:-USD}
      PLISIO_EXPIRE_MIN: ${PLISIO_EXPIRE_MIN:-60}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8081}
      TMA_PUBLIC_URL: ${TMA_PUBLIC_URL:-http://localhost:8081}
      ACTIVE_PAYMENT_GATEWAY: ${ACTIVE_PAYMENT_GATEWAY:-mock}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules
      - ./packages:/app/packages
      - /app/packages/shared/node_modules
      - ./prisma:/app/prisma
    command: >
      sh -c "
        npx prisma@5 db push --accept-data-loss &&
        node prisma/seed.js &&
        node scripts/seed-road-production.js &&
        rm -rf /app/apps/api/node_modules/* &&
        cd apps/api && /app/node_modules/.bin/nest start --watch
      "

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    container_name: blitz-admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5174:5174"
    environment:
      VITE_API_BASE: /admin/api
    volumes:
      - ./apps/admin/dist:/app/dist:ro
    command: serve -s dist -l 5174

  nginx:
    image: nginx:alpine
    container_name: blitz-nginx
    restart: unless-stopped
    depends_on:
      - api
      - admin
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web:/var/www/web:ro
      - ./stitch_blitz_finale_world_cup_edition:/var/www/stitch:ro
      - ./apps/admin/dist:/var/www/admin:ro

volumes:
  postgres_data:
  redis_data:
